services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg16-bookworm
    environment:
      POSTGRES_USER: piki
      POSTGRES_DB: piki
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      N8N_DB_PASSWORD_FILE: /run/secrets/n8n_db_password
    secrets:
      - postgres_password
      - n8n_db_password
    configs:
      - source: create_n8n_database
        target: /docker-entrypoint-initdb.d/01-create-n8n-database.sh
        mode: 0555
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U piki -d piki"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          memory: 256M
      placement:
        constraints:
          - node.labels.piki.data == true

  redis:
    image: redis:7.4.2-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 64M
      placement:
        constraints:
          - node.labels.piki.data == true

  piki-api:
    image: ${PIKI_IMAGE:?set PIKI_IMAGE to an immutable image tag or digest}
    environment:
      PIKI_ENVIRONMENT: production
      PIKI_LOG_LEVEL: INFO
      PIKI_DATABASE_URL_FILE: /run/secrets/piki_database_url
      PIKI_REDIS_URL: redis://redis:6379/0
      PIKI_META_APP_ID: ${PIKI_META_APP_ID:-}
      PIKI_META_APP_SECRET_FILE: /run/secrets/meta_app_secret
      PIKI_META_WEBHOOK_VERIFY_TOKEN_FILE: /run/secrets/meta_webhook_verify_token
      PIKI_META_PHONE_NUMBER_ID: ${PIKI_META_PHONE_NUMBER_ID:?set PIKI_META_PHONE_NUMBER_ID}
      PIKI_META_WABA_ID: ${PIKI_META_WABA_ID:?set PIKI_META_WABA_ID}
      PIKI_META_GRAPH_API_VERSION: ${PIKI_META_GRAPH_API_VERSION:?set PIKI_META_GRAPH_API_VERSION}
      PIKI_META_GRAPH_BASE_URL: https://graph.facebook.com
      PIKI_META_DELIVERY_TIMEOUT_SECONDS: ${PIKI_META_DELIVERY_TIMEOUT_SECONDS:-10}
      PIKI_META_INGRESS_ENABLED: ${PIKI_META_INGRESS_ENABLED:-false}
    secrets:
      - piki_database_url
      - meta_app_secret
      - meta_webhook_verify_token
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - backend
      - edge
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          memory: 128M

  piki-worker:
    image: ${PIKI_IMAGE:?set PIKI_IMAGE to an immutable image tag or digest}
    command: ["piki-worker"]
    environment:
      PIKI_ENVIRONMENT: production
      PIKI_LOG_LEVEL: INFO
      PIKI_DATABASE_URL_FILE: /run/secrets/piki_database_url
      PIKI_REDIS_URL: redis://redis:6379/0
      PIKI_CONVERSATION_ENABLED: ${PIKI_CONVERSATION_ENABLED:-false}
      PIKI_CONVERSATION_WORKER_ENABLED: ${PIKI_CONVERSATION_WORKER_ENABLED:-false}
      PIKI_CONVERSATION_WORKER_POLL_SECONDS: ${PIKI_CONVERSATION_WORKER_POLL_SECONDS:-1}
      PIKI_CONVERSATION_WORKER_CLAIM_TIMEOUT_SECONDS: ${PIKI_CONVERSATION_WORKER_CLAIM_TIMEOUT_SECONDS:-120}
      PIKI_CONVERSATION_WORKER_MAX_ATTEMPTS: ${PIKI_CONVERSATION_WORKER_MAX_ATTEMPTS:-3}
      PIKI_LLM_PROVIDER: ${PIKI_LLM_PROVIDER:?set PIKI_LLM_PROVIDER}
      PIKI_LLM_MODEL: ${PIKI_LLM_MODEL:?set PIKI_LLM_MODEL}
      PIKI_LLM_API_KEY_FILE: /run/secrets/llm_api_key
      PIKI_LLM_BASE_URL: ${PIKI_LLM_BASE_URL:?set PIKI_LLM_BASE_URL}
      PIKI_LLM_TIMEOUT_SECONDS: ${PIKI_LLM_TIMEOUT_SECONDS:-15}
      PIKI_LLM_MAX_ATTEMPTS: ${PIKI_LLM_MAX_ATTEMPTS:-2}
      PIKI_LLM_MAX_OUTPUT_TOKENS: ${PIKI_LLM_MAX_OUTPUT_TOKENS:-500}
      PIKI_BUENPICK_INTERNAL_API_BASE_URL: ${PIKI_BUENPICK_INTERNAL_API_BASE_URL:?set PIKI_BUENPICK_INTERNAL_API_BASE_URL}
      PIKI_BUENPICK_INTERNAL_API_TOKEN_FILE: /run/secrets/buenpick_internal_api_token
      PIKI_BUENPICK_TIMEOUT_SECONDS: ${PIKI_BUENPICK_TIMEOUT_SECONDS:-5}
      PIKI_BUENPICK_MAX_ATTEMPTS: ${PIKI_BUENPICK_MAX_ATTEMPTS:-3}
      PIKI_BUENPICK_ALLOW_PRODUCTION: "true"
      PIKI_META_ACCESS_TOKEN_FILE: /run/secrets/meta_access_token
      PIKI_META_PHONE_NUMBER_ID: ${PIKI_META_PHONE_NUMBER_ID:?set PIKI_META_PHONE_NUMBER_ID}
      PIKI_META_GRAPH_API_VERSION: ${PIKI_META_GRAPH_API_VERSION:?set PIKI_META_GRAPH_API_VERSION}
      PIKI_META_GRAPH_BASE_URL: https://graph.facebook.com
      PIKI_META_DELIVERY_TIMEOUT_SECONDS: ${PIKI_META_DELIVERY_TIMEOUT_SECONDS:-10}
    secrets:
      - piki_database_url
      - meta_access_token
      - llm_api_key
      - buenpick_internal_api_token
    healthcheck:
      test: ["CMD", "piki-worker", "--check"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - backend
      - edge
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          memory: 128M

  n8n:
    image: n8nio/n8n:2.4.4
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/n8n_db_password
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
      N8N_HOST: ${N8N_HOST:?set N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: https://${N8N_HOST:?set N8N_HOST}
      WEBHOOK_URL: https://${N8N_HOST:?set N8N_HOST}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
      TZ: America/Argentina/Buenos_Aires
    secrets:
      - n8n_db_password
      - n8n_encryption_key
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5678/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend
      - edge
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          memory: 256M
      placement:
        constraints:
          - node.labels.piki.data == true

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  backend:
    driver: overlay
    internal: true
  edge:
    external: true
    name: ${PIKI_EDGE_NETWORK:?set PIKI_EDGE_NETWORK}

configs:
  create_n8n_database:
    file: ../infra/postgres/init/01-create-n8n-database.sh

secrets:
  postgres_password:
    external: true
  n8n_db_password:
    external: true
  n8n_encryption_key:
    external: true
  piki_database_url:
    external: true
  meta_app_secret:
    external: true
  meta_access_token:
    external: true
  meta_webhook_verify_token:
    external: true
  llm_api_key:
    external: true
  buenpick_internal_api_token:
    external: true
