name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and development tools
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: MyPy
        run: mypy src
      - name: Tests
        run: pytest
