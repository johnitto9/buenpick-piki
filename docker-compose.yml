name: piki

x-piki-service: &piki-service
  build:
    context: .
    target: runtime
  image: piki-local:stage2
  restart: unless-stopped
  init: true
  environment: &piki-environment
    PIKI_ENVIRONMENT: development
    PIKI_LOG_LEVEL: INFO
    PIKI_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-piki}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-piki}
    PIKI_REDIS_URL: redis://redis:6379/0
    PIKI_CONVERSATION_ENABLED: ${PIKI_CONVERSATION_ENABLED:-false}
    PIKI_CONVERSATION_WORKER_ENABLED: ${PIKI_CONVERSATION_WORKER_ENABLED:-false}
    PIKI_CONVERSATION_WORKER_POLL_SECONDS: ${PIKI_CONVERSATION_WORKER_POLL_SECONDS:-1}
    PIKI_CONVERSATION_WORKER_CLAIM_TIMEOUT_SECONDS: ${PIKI_CONVERSATION_WORKER_CLAIM_TIMEOUT_SECONDS:-120}
    PIKI_CONVERSATION_WORKER_MAX_ATTEMPTS: ${PIKI_CONVERSATION_WORKER_MAX_ATTEMPTS:-3}
    PIKI_LOCAL_CONSOLE_ENABLED: ${PIKI_LOCAL_CONSOLE_ENABLED:-false}
    PIKI_LLM_PROVIDER: ${PIKI_LLM_PROVIDER:-}
    PIKI_LLM_MODEL: ${PIKI_LLM_MODEL:-}
    PIKI_LLM_API_KEY: ${PIKI_LLM_API_KEY:-}
    PIKI_LLM_API_KEY_FILE: ${PIKI_LLM_API_KEY_FILE:-}
    PIKI_LLM_BASE_URL: ${PIKI_LLM_BASE_URL:-https://api.openai.com/v1}
    PIKI_LLM_TIMEOUT_SECONDS: ${PIKI_LLM_TIMEOUT_SECONDS:-15}
    PIKI_LLM_MAX_ATTEMPTS: ${PIKI_LLM_MAX_ATTEMPTS:-2}
    PIKI_LLM_MAX_OUTPUT_TOKENS: ${PIKI_LLM_MAX_OUTPUT_TOKENS:-500}
    PIKI_BUENPICK_INTERNAL_API_BASE_URL: ${PIKI_BUENPICK_INTERNAL_API_BASE_URL:-http://buenpick-mock.invalid/internal/v1}
    PIKI_BUENPICK_INTERNAL_API_TOKEN: ${PIKI_BUENPICK_INTERNAL_API_TOKEN:-}
    PIKI_BUENPICK_INTERNAL_API_TOKEN_FILE: ${PIKI_BUENPICK_INTERNAL_API_TOKEN_FILE:-}
    PIKI_BUENPICK_TIMEOUT_SECONDS: ${PIKI_BUENPICK_TIMEOUT_SECONDS:-5}
    PIKI_BUENPICK_MAX_ATTEMPTS: ${PIKI_BUENPICK_MAX_ATTEMPTS:-3}
    PIKI_BUENPICK_ALLOW_PRODUCTION: ${PIKI_BUENPICK_ALLOW_PRODUCTION:-false}
    PIKI_META_APP_ID: ${PIKI_META_APP_ID:-}
    PIKI_META_APP_SECRET: ${PIKI_META_APP_SECRET:-}
    PIKI_META_APP_SECRET_FILE: ${PIKI_META_APP_SECRET_FILE:-}
    PIKI_META_WABA_ID: ${PIKI_META_WABA_ID:-}
    PIKI_META_PHONE_NUMBER_ID: ${PIKI_META_PHONE_NUMBER_ID:-}
    PIKI_META_ACCESS_TOKEN: ${PIKI_META_ACCESS_TOKEN:-}
    PIKI_META_ACCESS_TOKEN_FILE: ${PIKI_META_ACCESS_TOKEN_FILE:-}
    PIKI_META_WEBHOOK_VERIFY_TOKEN: ${PIKI_META_WEBHOOK_VERIFY_TOKEN:-}
    PIKI_META_WEBHOOK_VERIFY_TOKEN_FILE: ${PIKI_META_WEBHOOK_VERIFY_TOKEN_FILE:-}
    PIKI_META_GRAPH_API_VERSION: ${PIKI_META_GRAPH_API_VERSION:-}
    PIKI_META_GRAPH_BASE_URL: ${PIKI_META_GRAPH_BASE_URL:-https://graph.facebook.com}
    PIKI_META_DELIVERY_TIMEOUT_SECONDS: ${PIKI_META_DELIVERY_TIMEOUT_SECONDS:-10}
    PIKI_META_INGRESS_ENABLED: ${PIKI_META_INGRESS_ENABLED:-false}
  networks:
    - backend
    - edge

services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-piki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-piki}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD:?set N8N_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init/01-create-n8n-database.sh:/docker-entrypoint-initdb.d/01-create-n8n-database.sh:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  migrate:
    <<: *piki-service
    restart: "no"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  piki-api:
    <<: *piki-service
    ports:
      - "${PIKI_API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  piki-worker:
    <<: *piki-service
    command: ["piki-worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "piki-worker", "--check"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  n8n:
    image: n8nio/n8n:2.4.4
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?set N8N_DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Argentina/Buenos_Aires}
      TZ: ${GENERIC_TIMEZONE:-America/Argentina/Buenos_Aires}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5678/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend
      - edge

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  backend:
    internal: true
  edge:
